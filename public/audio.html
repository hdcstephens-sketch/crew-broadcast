<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>CREW — Commentary</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060c09;
      --card: #0f1510;
      --card2: #161e18;
      --accent: #00a86b;
      --accent-dim: rgba(0,168,107,0.15);
      --danger: #e53935;
      --danger-dim: rgba(229,57,53,0.15);
      --text: #f0f0f0;
      --text2: #8a9a90;
      --line: rgba(255,255,255,0.07);
      --r: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0 0 60px;
    }

    /* top bar */
    .topbar {
      width: 100%;
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(6,12,9,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
    }
    .topbar-brand {
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--accent);
    }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .pill {
      font-size: 12px; font-weight: 600;
      padding: 5px 12px; border-radius: 999px;
      border: 1px solid var(--line); color: var(--text2);
      text-decoration: none; background: var(--card);
    }
    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
    .dot.live { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .dot.err  { background: var(--danger); }
    #wsLabel { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; }

    /* main */
    .main { width: 100%; max-width: 480px; padding: 28px 16px; display: flex; flex-direction: column; gap: 20px; }

    /* mic orb */
    .orb-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 12px 0; }
    .orb {
      width: 160px; height: 160px;
      border-radius: 50%;
      border: 3px solid var(--line);
      background: var(--card);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: 0.22s;
      position: relative;
    }
    .orb:hover { border-color: rgba(0,168,107,0.4); }
    .orb-icon { font-size: 44px; line-height: 1; }
    .orb-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.12em; color: var(--text2);
    }
    .orb.live {
      border-color: var(--accent);
      background: rgba(0,168,107,0.08);
      box-shadow: 0 0 0 14px rgba(0,168,107,0.07), 0 0 50px rgba(0,168,107,0.12);
    }
    .orb.live .orb-label { color: var(--accent); }
    .orb.muted {
      border-color: var(--danger);
      background: rgba(229,57,53,0.08);
      box-shadow: 0 0 0 14px rgba(229,57,53,0.06);
    }
    .orb.muted .orb-label { color: var(--danger); }
    .orb.connecting { border-color: var(--accent); animation: pulse 1.2s ease infinite; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,168,107,0.3); }
      50%      { box-shadow: 0 0 0 24px rgba(0,168,107,0); }
    }

    .orb-state-text {
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.1em; color: var(--text2);
      text-transform: uppercase;
    }
    .orb-state-text.live { color: var(--accent); }
    .orb-state-text.muted { color: var(--danger); }

    /* level meter */
    .meter-wrap { width: 100%; display: flex; flex-direction: column; gap: 6px; }
    .meter-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); }
    .meter {
      height: 10px; border-radius: 999px;
      background: rgba(255,255,255,0.07);
      overflow: hidden;
    }
    .meter-fill {
      width: 0; height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #00a86b, #22c55e);
      transition: width 0.07s linear;
    }

    /* card */
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 16px;
    }
    .card-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text2); margin-bottom: 10px;
    }

    /* buttons */
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      flex: 1; min-width: 0;
      padding: 11px 10px; border-radius: 12px;
      border: 1px solid var(--line); background: var(--card2);
      color: var(--text); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: 0.13s; text-align: center;
    }
    .btn:hover { border-color: var(--accent); }
    .btn:disabled { opacity: 0.3; pointer-events: none; }
    .btn-go  { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-go:hover { background: #00c07a; }
    .btn-warn { background: var(--danger-dim); border-color: rgba(229,57,53,0.4); color: #ef9a9a; }
    .btn-warn:hover { background: rgba(229,57,53,0.28); }

    /* select */
    .sel {
      width: 100%; padding: 10px 12px;
      background: var(--card2); border: 1px solid var(--line);
      border-radius: 12px; color: var(--text);
      font-size: 14px; font-family: inherit; outline: none;
    }
    .sel:focus { border-color: var(--accent); }

    /* monitor toggle */
    .chip {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 14px; border-radius: 999px;
      border: 1px solid var(--line); background: var(--card2);
      color: var(--text2); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: 0.15s;
    }
    .chip.on { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

    /* https warning */
    .warn-banner {
      display: none; padding: 12px 16px;
      background: rgba(229,57,53,0.1); border: 1px solid rgba(229,57,53,0.25);
      border-radius: 12px; font-size: 13px; color: #ef9a9a;
    }
    .warn-banner.show { display: block; }

    /* log */
    .log { display: flex; flex-direction: column; gap: 6px; }
    .log-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; border-radius: 10px;
      background: var(--card2); font-size: 12px;
    }
    .log-time { font-size: 11px; color: var(--text2); white-space: nowrap; margin-left: 10px; }

    /* toasts */
    #toasts { position: fixed; bottom: 16px; right: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 999; }
    .toast { padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; color: #fff; }
    .toast.ok  { background: var(--accent); }
    .toast.err { background: var(--danger); }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">COMMENTARY</div>
  <div class="topbar-right">
    <span id="wsLabel"><span class="dot" id="wsDot"></span>Connecting</span>
    <a class="pill" href="/control.html">← Control</a>
    <a class="pill" href="/overlay.html" target="_blank">Overlay ↗</a>
  </div>
</div>

<div class="main">

  <div class="warn-banner" id="httpsWarn">
    Microphone access requires HTTPS when not on localhost. Make sure you're on the secure Railway URL.
  </div>

  <!-- Orb -->
  <div class="orb-wrap">
    <div class="orb" id="orb" onclick="orbTap()">
      <div class="orb-icon">🎙</div>
      <div class="orb-label" id="orbLabel">TAP TO GO LIVE</div>
    </div>
    <div class="orb-state-text" id="orbState">IDLE</div>

    <!-- Level meter -->
    <div class="meter-wrap">
      <div class="meter-row">
        <span>Input level</span>
        <span id="levelText">0%</span>
      </div>
      <div class="meter"><div class="meter-fill" id="meterFill"></div></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="btn-row">
    <button class="btn btn-go" id="btnLive" onclick="goLive()">Go Live</button>
    <button class="btn btn-warn" id="btnMute" onclick="toggleMute()" disabled>Mute</button>
    <button class="btn" id="btnEnd" onclick="endMic()" disabled>Release Mic</button>
  </div>

  <!-- Mic select + monitor -->
  <div class="card">
    <div class="card-label">Microphone</div>
    <select class="sel" id="deviceSelect" onchange="changeDevice(this.value)" style="margin-bottom:10px;">
      <option value="">Default Microphone</option>
    </select>
    <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
      <span class="chip" id="monitorChip" onclick="toggleMonitor()">🔇 Monitor Off</span>
      <button class="btn" style="flex:none; padding:8px 14px; font-size:12px;" onclick="refreshDevices()">Refresh Devices</button>
    </div>
  </div>

  <!-- Event log -->
  <div class="card">
    <div class="card-label">Event Log</div>
    <div class="log" id="logList">
      <div class="log-row"><span>Waiting for activity…</span></div>
    </div>
  </div>

</div>

<audio id="localMonitor" autoplay playsinline muted></audio>
<div id="toasts"></div>

<script>
const token = localStorage.getItem('crew_token');
const user  = JSON.parse(localStorage.getItem('crew_user') || 'null');
if (!token || !user) location.href = `/?next=${encodeURIComponent(location.pathname)}`;

if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
  document.getElementById('httpsWarn').classList.add('show');
}

let ws, pc = null, rawStream = null, broadcastStream = null;
let selectedDeviceId = '', localMonitorOn = false, isMuted = false;
let overlayPeerId = null, pendingIce = [];
let audioCtx = null, micSource = null, analyser = null, gainNode = null, broadcastDest = null, meterRaf = null;
let mode = 'idle';

// ── websocket ──
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  ws.onopen = () => { ws.send(JSON.stringify({ type: 'auth', token, clientRole: 'controller' })); };
  ws.onclose = () => { setWs(false); setTimeout(connect, 3000); };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'auth-ok') { setWs(true); refreshDevices(); log('Connected to server'); }
    if (msg.type === 'audio-answer' && pc) {
      overlayPeerId = msg.from;
      flushIce();
      pc.setRemoteDescription(new RTCSessionDescription(msg.answer)).then(() => log('Overlay answered ✓')).catch(err => log('Answer error: ' + err.message));
    }
    if (msg.type === 'ice-candidate' && pc) {
      if (!overlayPeerId) overlayPeerId = msg.from;
      flushIce();
      pc.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(() => {});
    }
  };
}

function setWs(ok) {
  document.getElementById('wsDot').className = 'dot ' + (ok ? 'live' : 'err');
  document.getElementById('wsLabel').innerHTML = `<span class="dot ${ok ? 'live' : 'err'}" id="wsDot"></span>${ok ? 'Live' : 'Reconnecting…'}`;
}

// ── orb tap — toggle between idle/live ──
function orbTap() {
  if (mode === 'idle') goLive();
  else if (mode === 'live' || mode === 'connecting') toggleMute();
}

// ── mic ──
async function requestMic() {
  const stream = await navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation: true, noiseSuppression: true, autoGainControl: true,
      ...(selectedDeviceId ? { deviceId: { exact: selectedDeviceId } } : {})
    }
  });
  await buildAudioGraph(stream);
  rawStream = stream;
  log('Mic ready: ' + (stream.getAudioTracks()[0]?.label || 'default'));
  refreshDevices();
}

async function buildAudioGraph(stream) {
  tearAudioGraph();
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  await audioCtx.resume();
  micSource = audioCtx.createMediaStreamSource(stream);
  analyser  = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  gainNode  = audioCtx.createGain();
  gainNode.gain.value = 1;
  broadcastDest = audioCtx.createMediaStreamDestination();
  micSource.connect(analyser);
  micSource.connect(gainNode);
  gainNode.connect(broadcastDest);
  broadcastStream = broadcastDest.stream;
  drawMeter();
}

function tearAudioGraph() {
  if (meterRaf) { cancelAnimationFrame(meterRaf); meterRaf = null; }
  if (audioCtx) audioCtx.close().catch(() => {});
  audioCtx = micSource = analyser = gainNode = broadcastDest = broadcastStream = null;
  document.getElementById('meterFill').style.width = '0%';
  document.getElementById('levelText').textContent = '0%';
}

function drawMeter() {
  if (!analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  (function tick() {
    analyser.getByteFrequencyData(data);
    const pct = Math.round(data.reduce((a, v) => Math.max(a, v), 0) / 255 * 100);
    document.getElementById('meterFill').style.width = pct + '%';
    document.getElementById('levelText').textContent = pct + '%';
    meterRaf = requestAnimationFrame(tick);
  })();
}

// ── go live ──
async function goLive() {
  try {
    if (!rawStream) await requestMic();
    if (pc) return;
    setMode('connecting');
    overlayPeerId = null;
    pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] });
    const track = broadcastStream?.getAudioTracks()?.[0];
    if (!track) throw new Error('No audio track');
    pc.addTrack(track, broadcastStream);
    pc.onicecandidate = ({ candidate }) => {
      if (!candidate) return;
      if (overlayPeerId && ws?.readyState === 1) ws.send(JSON.stringify({ type: 'ice-candidate', candidate, to: overlayPeerId }));
      else pendingIce.push(candidate);
    };
    pc.onconnectionstatechange = () => {
      if (pc.connectionState === 'connected') { setMode(isMuted ? 'muted' : 'live'); log('Overlay linked ✓'); }
      if (pc.connectionState === 'failed') log('Connection failed');
    };
    pc.oniceconnectionstatechange = () => {
      if (pc.iceConnectionState === 'failed') pc.restartIce();
    };
    const offer = await pc.createOffer({ offerToReceiveAudio: false });
    await pc.setLocalDescription(offer);
    ws.send(JSON.stringify({ type: 'audio-offer', offer }));
    log('Offer sent to overlay…');
    document.getElementById('btnLive').disabled = true;
    document.getElementById('btnMute').disabled = false;
    document.getElementById('btnEnd').disabled = false;
  } catch (err) {
    setMode('idle');
    log('Error: ' + err.message);
    toast('Mic error: ' + err.message, 'err');
  }
}

function toggleMute() {
  if (!gainNode) return;
  isMuted = !isMuted;
  gainNode.gain.value = isMuted ? 0 : 1;
  setMode(isMuted ? 'muted' : 'live');
  document.getElementById('btnMute').textContent = isMuted ? 'Unmute' : 'Mute';
  log(isMuted ? 'Muted' : 'Unmuted');
}

function endMic() {
  if (pc) { pc.close(); pc = null; }
  if (rawStream) { rawStream.getTracks().forEach(t => t.stop()); rawStream = null; }
  const mon = document.getElementById('localMonitor');
  mon.pause(); mon.srcObject = null;
  localMonitorOn = false;
  overlayPeerId = null; pendingIce = []; isMuted = false;
  tearAudioGraph();
  setMode('idle');
  document.getElementById('btnLive').disabled = false;
  document.getElementById('btnMute').disabled = true;
  document.getElementById('btnMute').textContent = 'Mute';
  document.getElementById('btnEnd').disabled = true;
  document.getElementById('monitorChip').textContent = '🔇 Monitor Off';
  document.getElementById('monitorChip').classList.remove('on');
  log('Mic released');
}

function setMode(m) {
  mode = m;
  const orb = document.getElementById('orb');
  const label = document.getElementById('orbLabel');
  const state = document.getElementById('orbState');
  orb.className = 'orb ' + (m === 'idle' ? '' : m);
  const map = {
    idle:       ['🎙', 'TAP TO GO LIVE', 'IDLE',       ''],
    connecting: ['📡', 'LINKING…',       'LINKING',    ''],
    live:       ['🎙', 'ON AIR',         'LIVE',       'live'],
    muted:      ['🔇', 'MUTED',          'MUTED',      'muted']
  };
  const [icon, lb, st, cls] = map[m] || map.idle;
  orb.querySelector('.orb-icon').textContent = icon;
  label.textContent = lb;
  state.textContent = st;
  state.className = 'orb-state-text ' + cls;
}

function toggleMonitor() {
  if (!rawStream) { toast('Go live first', 'err'); return; }
  localMonitorOn = !localMonitorOn;
  const mon = document.getElementById('localMonitor');
  mon.srcObject = rawStream;
  mon.muted = !localMonitorOn;
  if (localMonitorOn) mon.play().catch(() => {});
  else mon.pause();
  const chip = document.getElementById('monitorChip');
  chip.textContent = localMonitorOn ? '🔊 Monitor On' : '🔇 Monitor Off';
  chip.classList.toggle('on', localMonitorOn);
}

async function refreshDevices() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const sel = document.getElementById('deviceSelect');
    const cur = sel.value;
    sel.innerHTML = '<option value="">Default Microphone</option>' +
      devices.filter(d => d.kind === 'audioinput')
             .map(d => `<option value="${d.deviceId}">${d.label || 'Microphone'}</option>`)
             .join('');
    if (cur) sel.value = cur;
  } catch {}
}

async function changeDevice(id) {
  selectedDeviceId = id;
  if (!rawStream) return;
  const wasLive = !!pc;
  await endMic();
  try {
    await requestMic();
    if (wasLive) await goLive();
  } catch (err) { toast('Device change failed', 'err'); }
}

function flushIce() {
  if (!overlayPeerId || ws?.readyState !== 1) return;
  pendingIce.forEach(c => ws.send(JSON.stringify({ type: 'ice-candidate', candidate: c, to: overlayPeerId })));
  pendingIce = [];
}

function log(msg) {
  const list = document.getElementById('logList');
  if (list.children.length === 1 && list.children[0].querySelector('span')?.textContent === 'Waiting for activity…') list.innerHTML = '';
  const row = document.createElement('div');
  row.className = 'log-row';
  row.innerHTML = `<span>${msg}</span><span class="log-time">${new Date().toLocaleTimeString()}</span>`;
  list.prepend(row);
  while (list.children.length > 8) list.removeChild(list.lastChild);
}

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast ' + (type || '');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

connect();
</script>
</body>
</html>
