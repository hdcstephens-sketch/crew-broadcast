<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREW — Race Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #060c09;
      --card:       #0f1510;
      --card2:      #161e18;
      --accent:     #00a86b;
      --accent-dim: rgba(0,168,107,0.15);
      --danger:     #e53935;
      --danger-dim: rgba(229,57,53,0.12);
      --text:       #f0f0f0;
      --text2:      #8a9a90;
      --line:       rgba(255,255,255,0.07);
      --r:          14px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding-bottom: 60px;
    }

    /* ── top bar ── */
    .topbar {
      width: 100%; position: sticky; top: 0; z-index: 50;
      background: rgba(6,12,9,0.96); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .brand { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 0.08em; color: var(--accent); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; flex-shrink: 0; display: inline-block; }
    .dot.live { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .dot.err  { background: var(--danger); }
    #wsLabel { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
    .pill { font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 999px; border: 1px solid var(--line); color: var(--text2); text-decoration: none; background: var(--card); cursor: pointer; }
    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .admin-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; background: var(--accent-dim); border: 1px solid rgba(0,168,107,0.3); color: var(--accent); letter-spacing: 0.06em; }

    /* ── layout ── */
    .main { width: 100%; max-width: 600px; padding: 24px 16px; display: flex; flex-direction: column; gap: 20px; }

    /* ── section head ── */
    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .section-title { font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text2); }

    /* ── race list ── */
    .race-list { display: flex; flex-direction: column; gap: 8px; }
    .race-card {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--r);
      padding: 13px 16px; display: flex; align-items: center; gap: 14px;
      transition: border-color 0.15s;
    }
    .race-card.editing { border-color: rgba(0,168,107,0.35); }
    .race-num {
      min-width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent-dim); border: 1px solid rgba(0,168,107,0.25);
      color: var(--accent); font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .race-info { flex: 1; min-width: 0; }
    .race-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .race-sub  { font-size: 12px; color: var(--text2); margin-top: 2px; }

    /* ── admin edit controls inside card ── */
    .edit-inputs { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .edit-inp {
      width: 100%; padding: 7px 10px; background: var(--card2);
      border: 1px solid var(--line); border-radius: 8px;
      color: var(--text); font-size: 13px; font-family: inherit; outline: none;
    }
    .edit-inp:focus { border-color: var(--accent); }
    .edit-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn {
      width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--line);
      background: var(--card2); color: var(--text2); font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: 0.13s;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
    .icon-btn.save { background: var(--accent-dim); border-color: rgba(0,168,107,0.35); color: var(--accent); }
    .icon-btn.save:hover { background: var(--accent); color: #fff; }

    /* ── add race row (admin) ── */
    .add-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .add-inp {
      flex: 1; min-width: 120px; padding: 9px 12px; background: var(--card2);
      border: 1px solid var(--line); border-radius: 10px;
      color: var(--text); font-size: 13px; font-family: inherit; outline: none;
    }
    .add-inp:focus { border-color: var(--accent); }
    .add-btn {
      padding: 9px 16px; border-radius: 10px; border: 1px solid rgba(0,168,107,0.35);
      background: var(--accent-dim); color: var(--accent); font-size: 13px;
      font-weight: 600; font-family: inherit; cursor: pointer; white-space: nowrap;
    }
    .add-btn:hover { background: var(--accent); color: #fff; }

    /* ── empty state ── */
    .empty {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--r);
      padding: 32px 20px; text-align: center; color: var(--text2); font-size: 13px;
    }
    .empty-icon { font-size: 32px; margin-bottom: 10px; }

    /* ── PDF card ── */
    .pdf-card {
      background: var(--card); border: 1px solid rgba(0,168,107,0.25); border-radius: var(--r);
      padding: 16px 18px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .pdf-icon { font-size: 32px; flex-shrink: 0; }
    .pdf-info { flex: 1; min-width: 120px; }
    .pdf-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .pdf-sub   { font-size: 12px; color: var(--text2); }
    .pdf-actions { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
    .pdf-btn {
      padding: 8px 16px; border-radius: 10px;
      background: var(--accent); border: none; color: #fff;
      font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; text-decoration: none; white-space: nowrap;
    }
    .pdf-btn:hover { background: #00c07a; }
    .pdf-btn.ghost {
      background: transparent; border: 1px solid var(--line); color: var(--text2);
    }
    .pdf-btn.ghost:hover { border-color: var(--accent); color: var(--accent); }
    .pdf-btn.del { background: var(--danger-dim); border: 1px solid rgba(229,57,53,0.3); color: #ef9a9a; }
    .pdf-btn.del:hover { background: rgba(229,57,53,0.25); }

    /* ── toasts ── */
    #toasts { position: fixed; bottom: 16px; right: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 999; }
    .toast { padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; color: #fff; animation: fadeIn 0.15s ease; }
    .toast.ok  { background: var(--accent); }
    .toast.err { background: var(--danger); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="brand">CREW</div>
    <span id="wsLabel"><span class="dot" id="wsDot"></span>Connecting</span>
    <span id="adminBadge" class="admin-badge" style="display:none;">ADMIN</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <a id="controlLink" class="pill" href="/control.html" style="display:none;">← Control</a>
  </div>
</div>

<div class="main">

  <!-- Race Schedule -->
  <div>
    <div class="section-head">
      <span class="section-title">Today's Race Schedule</span>
    </div>
    <div class="race-list" id="raceList">
      <div class="empty"><div class="empty-icon">🚣</div>Schedule loading…</div>
    </div>

    <!-- Add race row — admin only -->
    <div id="addRaceRow" style="display:none; margin-top:10px;">
      <div class="add-row">
        <input class="add-inp" id="newName" placeholder="Race name (e.g. Men's Varsity 8+)">
        <input class="add-inp" id="newSub"  placeholder="Subtitle (e.g. 10:30 AM)">
        <button class="add-btn" onclick="addRace()">+ Add Race</button>
      </div>
    </div>
  </div>

  <!-- Schedule PDF -->
  <div id="pdfSection" style="display:none;">
    <div class="section-head">
      <span class="section-title">Schedule PDF</span>
    </div>
    <div class="pdf-card">
      <div class="pdf-icon">📄</div>
      <div class="pdf-info">
        <div class="pdf-title">Official Schedule</div>
        <div class="pdf-sub">Tap to open or download the full schedule PDF</div>
      </div>
      <div class="pdf-actions">
        <a class="pdf-btn" href="/uploads/schedule.pdf" target="_blank">Open PDF</a>
        <!-- admin only -->
        <label id="replacePdfBtn" style="display:none;">
          <input type="file" accept="application/pdf" style="display:none;" onchange="uploadPDF(this)">
          <span class="pdf-btn ghost" style="cursor:pointer;">Replace</span>
        </label>
        <button id="deletePdfBtn" class="pdf-btn del" onclick="deletePDF()" style="display:none;">Remove</button>
      </div>
    </div>
  </div>

  <!-- PDF upload when no PDF exists — admin only -->
  <div id="pdfUploadSection" style="display:none;">
    <div class="section-head">
      <span class="section-title">Schedule PDF</span>
    </div>
    <label style="display:block;">
      <input type="file" accept="application/pdf" style="display:none;" onchange="uploadPDF(this)">
      <div class="pdf-card" style="cursor:pointer;border-style:dashed;justify-content:center;flex-direction:column;text-align:center;gap:8px;" onclick="this.previousElementSibling.click()">
        <div style="font-size:28px;">📤</div>
        <div style="font-size:13px;font-weight:600;color:var(--text2);">Upload Schedule PDF</div>
        <div style="font-size:11px;color:var(--text2);">Tap to choose a file — visible to all viewers</div>
      </div>
    </label>
  </div>

</div>

<div id="toasts"></div>

<script>
// ── detect admin ──────────────────────────────────────────────────────
const token = localStorage.getItem('crew_token');
const storedUser = JSON.parse(localStorage.getItem('crew_user') || 'null');
const isAdmin = storedUser?.role === 'admin';

if (isAdmin) {
  document.getElementById('adminBadge').style.display  = '';
  document.getElementById('controlLink').style.display = '';
  document.getElementById('addRaceRow').style.display  = '';
}

// ── state ─────────────────────────────────────────────────────────────
let ws;
let raceSchedule = [];
let editingIdx = null;

// ── websocket ─────────────────────────────────────────────────────────
function wsConnect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  ws.onopen  = () => {
    if (isAdmin && token) {
      ws.send(JSON.stringify({ type: 'auth', token }));
    } else {
      ws.send(JSON.stringify({ type: 'register', role: 'viewer' }));
    }
  };
  ws.onclose = () => { setWsStatus(false); setTimeout(wsConnect, 3000); };
  ws.onerror = () => {};
  ws.onmessage = e => {
    try { onMsg(JSON.parse(e.data)); } catch {}
  };
}

function wsSend(data) {
  if (ws?.readyState === 1) ws.send(JSON.stringify(data));
}

function onMsg(msg) {
  if (msg.type === 'auth-ok' || msg.type === 'state') {
    setWsStatus(true);
    if (msg.raceSchedule !== undefined) { raceSchedule = msg.raceSchedule || []; render(); }
    if (msg.hasPDF !== undefined) setPDF(msg.hasPDF);
  }
  if (msg.type === 'race-schedule') {
    raceSchedule = msg.schedule || [];
    render();
  }
}

// ── render ────────────────────────────────────────────────────────────
function render() {
  const list = document.getElementById('raceList');
  if (!raceSchedule.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🚣</div>No races scheduled yet.</div>';
    return;
  }
  list.innerHTML = raceSchedule.map((r, i) => {
    if (isAdmin && editingIdx === i) {
      return `
        <div class="race-card editing">
          <div class="race-num">${i + 1}</div>
          <div class="edit-inputs">
            <input class="edit-inp" id="ei-name-${i}" value="${esc(r.name)}" placeholder="Race name">
            <input class="edit-inp" id="ei-sub-${i}"  value="${esc(r.sub || '')}" placeholder="Subtitle (optional)">
          </div>
          <div class="edit-actions">
            <button class="icon-btn save" onclick="saveEdit(${i})" title="Save">✓</button>
            <button class="icon-btn" onclick="cancelEdit()" title="Cancel">✕</button>
            <button class="icon-btn danger" onclick="deleteRace(${i})" title="Delete">🗑</button>
          </div>
        </div>`;
    }
    return `
      <div class="race-card">
        <div class="race-num">${i + 1}</div>
        <div class="race-info" style="flex:1;">
          <div class="race-name">${esc(r.name)}</div>
          ${r.sub ? `<div class="race-sub">${esc(r.sub)}</div>` : ''}
        </div>
        ${isAdmin ? `<button class="icon-btn" onclick="startEdit(${i})" title="Edit">✏️</button>` : ''}
      </div>`;
  }).join('');
}

// ── admin edit actions ────────────────────────────────────────────────
function startEdit(i) { editingIdx = i; render(); document.getElementById(`ei-name-${i}`)?.focus(); }
function cancelEdit()  { editingIdx = null; render(); }

function saveEdit(i) {
  const name = document.getElementById(`ei-name-${i}`)?.value.trim();
  if (!name) return;
  raceSchedule[i] = { ...raceSchedule[i], name, sub: document.getElementById(`ei-sub-${i}`)?.value.trim() };
  editingIdx = null;
  saveSchedule();
}

function addRace() {
  const name = document.getElementById('newName').value.trim();
  if (!name) return;
  raceSchedule.push({ name, sub: document.getElementById('newSub').value.trim() });
  document.getElementById('newName').value = '';
  document.getElementById('newSub').value  = '';
  saveSchedule();
}

function deleteRace(i) {
  raceSchedule.splice(i, 1);
  editingIdx = null;
  saveSchedule();
}

function saveSchedule() {
  wsSend({ type: 'race-schedule-save', schedule: raceSchedule });
  render();
}

// ── PDF ───────────────────────────────────────────────────────────────
function setPDF(exists) {
  document.getElementById('pdfSection').style.display       = exists ? '' : 'none';
  document.getElementById('replacePdfBtn').style.display    = isAdmin && exists ? '' : 'none';
  document.getElementById('deletePdfBtn').style.display     = isAdmin && exists ? '' : 'none';
  document.getElementById('pdfUploadSection').style.display = isAdmin && !exists ? '' : 'none';
}

async function uploadPDF(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const res = await fetch('/api/upload-schedule', {
      method: 'POST',
      headers: { 'Content-Type': 'application/pdf', 'Authorization': 'Bearer ' + token },
      body: file
    });
    if (!res.ok) throw new Error('Upload failed');
    setPDF(true);
    toast('Schedule PDF uploaded ✓', 'ok');
  } catch (e) { toast('Upload failed: ' + e.message, 'err'); }
  input.value = '';
}

async function deletePDF() {
  try {
    await fetch('/api/upload-schedule', { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
    setPDF(false);
    toast('PDF removed', 'ok');
  } catch { toast('Remove failed', 'err'); }
}

// ── helpers ───────────────────────────────────────────────────────────
function setWsStatus(ok) {
  document.getElementById('wsDot').className = 'dot ' + (ok ? 'live' : 'err');
  document.getElementById('wsLabel').innerHTML =
    `<span class="dot ${ok ? 'live' : 'err'}" id="wsDot"></span>${ok ? 'Live' : 'Reconnecting…'}`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

wsConnect();
</script>
</body>
</html>
